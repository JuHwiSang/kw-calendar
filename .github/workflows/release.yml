# Actions 탭에서 수동 실행: 버전 bump 타입(patch/minor/major) 선택 → 태그 생성 → 빌드/배포
#
# 실행 내용:
#   1) WinForms 앱 publish (self-contained + framework-dependent) → GitHub Release 업로드
#   2) Supabase DB migration push + Edge Functions 배포
#
# 필요 Secrets / Variables (Settings → Secrets and variables → Actions):
#   - SUPABASE_ACCESS_TOKEN (Secret)   — Dashboard → Account → Access Tokens
#   - SUPABASE_PROJECT_ID   (Variable) — Project Settings → Reference ID

name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  tag:
    name: Create version tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        uses: mathieudutour/github-tag-action@v6.2
        id: tag
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          default_bump: ${{ github.event.inputs.bump }}
          tag_prefix: "v"

  publish-app:
    name: Publish WinForms app
    needs: tag
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore KW-Calendar.slnx

      - name: Build
        run: dotnet build KW-Calendar.slnx -c Release --no-restore

      - name: Test
        run: dotnet test KW-Calendar.slnx -c Release --no-build --logger "trx" --results-directory TestResults

      - name: Publish (self-contained single-file)
        run: >
          dotnet publish KW-Calendar/KW-Calendar.csproj
          -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish-sc

      - name: Publish (framework-dependent)
        run: >
          dotnet publish KW-Calendar/KW-Calendar.csproj
          -c Release -r win-x64
          --self-contained false
          -o publish-fd

      - name: Package self-contained ZIP
        shell: pwsh
        run: Compress-Archive -Path publish-sc\* -DestinationPath KW-Calendar-${{ needs.tag.outputs.new_tag }}-win-x64-selfcontained.zip

      - name: Package framework-dependent ZIP
        shell: pwsh
        run: Compress-Archive -Path publish-fd\* -DestinationPath KW-Calendar-${{ needs.tag.outputs.new_tag }}-win-x64-fx.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          generate_release_notes: true
          files: |
            KW-Calendar-${{ needs.tag.outputs.new_tag }}-win-x64-selfcontained.zip
            KW-Calendar-${{ needs.tag.outputs.new_tag }}-win-x64-fx.zip

  deploy-supabase:
    name: Deploy to Supabase
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Lint
        run: deno lint supabase/functions/

      - name: Test
        run: deno test --allow-all --config supabase/functions/deno.json supabase/functions/

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref ${{ vars.SUPABASE_PROJECT_ID }}
      
      - name: Push database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push
      
      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy

      # - name: Set Edge Functions secrets
      #   env:
      #     SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      #   run: |
      #     supabase secrets set MY_API_KEY=${{ secrets.MY_API_KEY }}
